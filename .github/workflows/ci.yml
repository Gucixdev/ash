name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ashcore:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ashcore
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: ashcore/pixi.toml
          cache: true

      - name: Shim magic -> pixi
        run: |
          mkdir -p "$HOME/.local/bin"
          printf '#!/usr/bin/env bash\nexec pixi "$@"\n' > "$HOME/.local/bin/magic"
          chmod +x "$HOME/.local/bin/magic"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: ./test run

  ashparser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ashparser
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: ashparser/pixi.toml
          cache: true

      - name: Shim magic -> pixi
        run: |
          mkdir -p "$HOME/.local/bin"
          printf '#!/usr/bin/env bash\nexec pixi "$@"\n' > "$HOME/.local/bin/magic"
          chmod +x "$HOME/.local/bin/magic"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: ./test run

  ashllmtools:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ashllmtools
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: ashllmtools/pixi.toml
          cache: false
          locked: false

      - name: Debug module resolution
        run: |
          echo "--- shell pwd/ls ---"
          pwd
          ls -la
          ls -la tools
          echo "--- pixi run pwd/ls (does pixi change cwd?) ---"
          pixi run bash -c 'pwd && ls -la' || true
          echo "--- mojo run -I \$(pwd) (absolute path instead of .) ---"
          pixi run mojo run -I "$(pwd)" test_llmtools.mojo 2>&1 | head -20 || true
          echo "--- mojo --version ---"
          pixi run mojo --version || true

      - name: Run tests
        run: pixi run test
